name: Build desktop

# Tag + PR + manual only — not push to main. Pushing main and a v* tag for the same commit
# would otherwise trigger this workflow twice. Lint/typecheck/tests run in ci.yml on main.
on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver for this release (e.g. 1.0.0 or v1.0.0). Creates tag vX.Y.Z at the workflow commit."
        required: true
        type: string

concurrency:
  # Same branch/tag push cancels superseded runs; workflow_dispatch is keyed by version so different releases can run in parallel.
  group: build-desktop-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.version || 'ci' }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Windows portable .exe)
        run: npm run build && npx electron-builder --win portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-windows-exe
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (macOS .dmg)
        run: npm run build && npx electron-builder --mac dmg --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-macos-dmg
          path: release/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app (Linux AppImage)
        run: npm run build && npx electron-builder --linux AppImage --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-linux-AppImage
          path: release/*.AppImage

  # GitHub "Releases" only show items created as Releases — not workflow artifacts.
  # Runs when you push a tag like v1.0.0, or when you run this workflow manually with a version (creates the release at that tag).
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) -exec cp -f {} release-assets/ \;
          ls -la release-assets

      - name: Set release tag name
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW='${{ inputs.version }}'
            RAW="${RAW#v}"
            if ! echo "$RAW" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::version must be semver X.Y.Z (optionally prefixed with v)"
              exit 1
            fi
            echo "tag_name=v${RAW}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with assets (git tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with assets (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
