name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "public/codefrydev-icon.svg"
      - ".github/workflows/deploy-pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync icon into docs (matches repo root branding)
        run: cp -f public/codefrydev-icon.svg docs/codefrydev-icon.svg

      # Single source of truth for owner/repo (works with custom domains; sed on HTML often breaks)
      - name: Write docs/repo-config.json
        run: printf '%s\n' '{"repository":"${{ github.repository }}"}' > docs/repo-config.json

      # Baked at deploy time so the browser never calls api.github.com (avoids 403 / rate limits from the client).
      - name: Fetch releases JSON for static docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if ! curl -sS -f -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
            -o docs/releases-data.json
          then
            echo '[]' > docs/releases-data.json
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
